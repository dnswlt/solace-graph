syntax = "proto3";

package swcat.catalog.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dnswlt/swcat/internal/catalog/pb;catalog_pb";

// Metadata common to all entities.
message Metadata {
  // The name of the entity. Must be unique within the catalog at any given point in time, for any given namespace + kind pair.
  string name = 1;
  // The namespace that the entity belongs to. If empty, the entity is assume to live in the default namespace.
  string namespace = 2;
  // A display name of the entity, to be presented in user interfaces instead of the name property, when available.
  string title = 3;
  // A short (typically relatively few words, on one line) description of the entity.
  string description = 4;
  // Key/value pairs of identifying information attached to the entity.
  map<string, string> labels = 5;
  // Key/value pairs of non-identifying auxiliary information attached to the entity.
  map<string, string> annotations = 6;
  // A list of single-valued strings, to for example classify catalog entities in various ways.
  repeated string tags = 7;
  // A list of external hyperlinks related to the entity.
  repeated Link links = 8;
}

message Link {
  string url = 1;
  string title = 2;
  string icon = 3;
  string type = 4;
  bool is_generated = 5;
  // Set for auto-generated multi-environment links. Non-nil links with the
  // same group_info.group are rendered together in the UI.
  LinkGroupInfo group_info = 6;
}

// LinkGroupInfo groups multiple links (e.g. one per environment) under a
// shared display title. A nil value means the link is standalone.
message LinkGroupInfo {
  string group = 1; // shared display title for the group, e.g. "Monitoring"
  string label = 2; // per-link label within the group, e.g. "dev", "prod"
}

// Ref represents a reference to another entity.
message Ref {
  string kind = 1;
  string namespace = 2;
  string name = 3;
}

// LabelRef represents a reference with an optional label and attributes.
message LabelRef {
  Ref ref = 1;
  string label = 2;
  map<string, string> attrs = 3;
}

message Version {
  string raw_version = 1;
  int32 major = 2;
  int32 minor = 3;
  int32 patch = 4;
  string suffix = 5;
}

// Entity represents any catalog entity.
message Entity {
  string kind = 1;
  Metadata metadata = 2;

  oneof spec {
    DomainSpec domain_spec = 3;
    SystemSpec system_spec = 4;
    ComponentSpec component_spec = 5;
    ResourceSpec resource_spec = 6;
    ApiSpec api_spec = 7;
    GroupSpec group_spec = 8;
  }

  // Runtime status. Not persisted in the repository, but populated at runtime
  // (e.g. by plugins). Always nil for Group entities.
  Status status = 9;
}

// ListEntitiesResponse is the response body of GET /catalog/entities.
message ListEntitiesResponse {
  repeated Entity entities = 1;
}

// Status holds runtime observations attached to an entity by plugins.
message Status {
  // Map from observation name (following annotation naming conventions) to
  // status observation.
  map<string, Observation> observations = 1;
}

message Observation {
  // The observation value as a parsed JSON value, so it round-trips through
  // protojson as native JSON (object/array/number/string/bool/null) rather
  // than a base64-encoded blob.
  google.protobuf.Value value = 1;
  // Identifier of the plugin that produced this observation.
  string producer = 2;
  google.protobuf.Timestamp updated_at = 3;
  // Optional: the entity version at which this observation was made.
  string version = 4;
  // Optional: additional metadata for display in custom content.
  map<string, string> meta = 5;
}

// --- Observed dependencies ---

// ObservedDependencies is the schema external tools must comply with when
// reporting the dependencies they observed for a single source entity. swcat
// stores these tentative, "observed" dependencies in the source entity's
// Status observations, kept separate from the declared dependencies in the
// entity's spec.
message ObservedDependencies {
  // Reference to the source entity that the observed dependencies originate
  // from. Required.
  Ref source = 1;
  // Label of the external tool that detected these dependencies. Required.
  string detected_by = 2;
  // When the dependencies were observed. If unset, the server populates it
  // with the receive timestamp. Maps to Observation.updated_at.
  google.protobuf.Timestamp observed_at = 3;
  // The dependencies observed for the source entity. Reporting an empty list
  // clears the previously observed dependencies for this source/detected_by
  // pair.
  repeated ObservedDependency dependencies = 4;
  // Optional: the version of the source entity these dependencies were
  // observed for, e.g. "1.4.2". Maps to Observation.version.
  string version = 5;
  // Optional: additional metadata about this observation, for display in
  // custom content. Maps to Observation.meta.
  map<string, string> meta = 6;
}

// ObservedDependency is a single dependency from a source entity to a target
// entity, as detected by an external tool.
message ObservedDependency {
  // Reference to the entity that the source entity depends on. Required.
  Ref target = 1;
  // The nature of the dependency relationship.
  DependencyRelation relation = 2;
  // The evidence on which the detection was based, e.g. a list of topic names,
  // an RPC Service.Method name, or other relevant detail.
  repeated string evidence = 3;
}

// DependencyRelation classifies the nature of an observed dependency.
enum DependencyRelation {
  // Unknown relation; treated as a generic dependency.
  DEPENDENCY_RELATION_UNSPECIFIED = 0;
  // The source entity makes synchronous calls to the target, e.g. via REST,
  // gRPC or GraphQL.
  DEPENDENCY_RELATION_CALLS = 1;
  // The source entity produces messages/events to the target, e.g. a pub/sub
  // topic or message queue.
  DEPENDENCY_RELATION_PRODUCES = 2;
  // The source entity consumes messages/events from the target, e.g. as a
  // pub/sub subscriber or queue consumer.
  DEPENDENCY_RELATION_CONSUMES = 3;
}

// --- Domain ---

message DomainSpec {
  Ref owner = 1;
  Ref subdomain_of = 2;
  string type = 3;

  // Inverse relationships
  repeated Ref systems = 4;
}

// --- System ---

message SystemSpec {
  Ref owner = 1;
  Ref domain = 2;
  string type = 3;

  // Inverse relationships
  repeated Ref components = 4;
  repeated Ref apis = 5;
  repeated Ref resources = 6;
}

// --- Component ---

message ComponentSpec {
  string type = 1;
  string lifecycle = 2;
  Ref owner = 3;
  Ref system = 4;
  Ref domain = 11;
  Ref subcomponent_of = 5;
  repeated LabelRef provides_apis = 6;
  repeated LabelRef consumes_apis = 7;
  repeated LabelRef depends_on = 8;

  // Inverse relationships
  repeated LabelRef dependents = 9;
  repeated Ref subcomponents = 10;
}

// --- Resource ---

message ResourceSpec {
  string type = 1;
  Ref owner = 2;
  Ref system = 3;
  Ref domain = 6;
  repeated LabelRef depends_on = 4;

  // Inverse relationships
  repeated LabelRef dependents = 5;
}

// --- API ---

message ApiSpec {
  string type = 1;
  string lifecycle = 2;
  Ref owner = 3;
  Ref system = 4;
  Ref domain = 9;
  string definition = 5;
  repeated ApiSpecVersion versions = 6;

  // Inverse relationships
  repeated LabelRef providers = 7;
  repeated LabelRef consumers = 8;
}

message ApiSpecVersion {
  Version version = 1;
  string lifecycle = 2;
}

// --- Group ---

message GroupSpec {
  string type = 1;
  GroupSpecProfile profile = 2;
  Ref parent = 3;
  repeated Ref children = 4;
  repeated string members = 5;
}

message GroupSpecProfile {
  string display_name = 1;
  string email = 2;
  string picture = 3;
}
